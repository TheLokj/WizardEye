name: Test

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11"]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            bwa \
            samtools \
            bedtools \
            seqkit \
            parallel
          
          wget -q http://hgdownload.soe.ucsc.edu/admin/exe/linux.x86_64/bedGraphToBigWig
          wget -q http://hgdownload.soe.ucsc.edu/admin/exe/linux.x86_64/bigWigToBedGraph
          
          chmod +x bedGraphToBigWig bigWigToBedGraph
          sudo mv bedGraphToBigWig bigWigToBedGraph /usr/local/bin/

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: 'pip' 

      - name: Install package and dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[test]"

      - name: Check code style with Ruff
        run: |
          ruff check .

      - name: Run integration tests
        working-directory: tests/integration
        run: python -m pytest consistency.py -v
        env:
          PYTHONPATH: ${{ github.workspace }}/src